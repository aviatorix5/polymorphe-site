al;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ff317184-3c79-4980-a7fc-8c098f0b2b55\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   POLYMORPHE — Direction \"Rick Owens\"\n   Mono near-black/off-white. Hanken Grotesk uppercase only.\n   Zero color accent, zero ornament. Image-first.\n   ============================================================ */\n\n/* RESET ============================================== */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\nbutton { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }\n\n/* TOKENS ============================================= */\n:root {\n  --ink:    #0a0a0a;\n  --fg:     #f4f4f2;\n  --fg-2:   #c9c9c5;\n  --mute:   #807f7c;\n  --mute-2: #4a4a47;\n  --rule:   #1c1c1b;\n  --rule-2: #262624;\n\n  --pad-x:  clamp(20px, 3.5vw, 48px);\n\n  --sans:   'Hanken Grotesk', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;\n\n  --t-9:  9.5px;\n  --t-10: 10px;\n  --t-11: 11px;\n  --t-12: 12px;\n  --t-13: 13px;\n  --t-14: 14px;\n  --t-15: 15px;\n}\n\n/* BASE =============================================== */\nhtml { background: var(--ink); }\nbody {\n  background: var(--ink);\n  color: var(--fg);\n  font-family: var(--sans);\n  font-weight: 400;\n  font-size: var(--t-12);\n  line-height: 1.55;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  min-height: 100vh;\n}\n::selection { background: var(--fg); color: var(--ink); }\n\n/* LANG TOGGLE ======================================== */\nhtml:not(.lang-en) [lang=\"en\"] { display: none !important; }\nhtml.lang-en [lang=\"fr\"]      { display: none !important; }\n\n/* Italic emphasis is reset to upright in Rick Owens vocabulary */\nem, i { font-style: normal; }\n\n/* ============================================================\n   GLOBAL NAV — plain text, always visible\n   ============================================================ */\n.ro-nav {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  gap: 20px;\n  padding: 18px var(--pad-x);\n  background: var(--ink);\n  border-bottom: 1px solid var(--rule);\n  font-size: var(--t-11);\n  letter-spacing: 0.18em;\n  color: var(--fg);\n}\n.ro-nav-brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.ro-nav-brand img {\n  display: block;\n  width: 34px;\n  height: auto;\n}\n.ro-nav-brand .name {\n  font-size: var(--t-11);\n  letter-spacing: 0.22em;\n  color: var(--fg);\n}\n.ro-nav-mid {\n  display: flex;\n  gap: 28px;\n  justify-content: center;\n}\n.ro-nav-mid a {\n  color: var(--mute);\n  transition: color .15s ease;\n}\n.ro-nav-mid a:hover { color: var(--fg); }\n.ro-nav-mid a.is-active { color: var(--fg); }\n.ro-nav-right {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  justify-content: flex-end;\n}\n.ro-nav-right button { color: var(--mute); transition: color .15s ease; }\n.ro-nav-right button[aria-current=\"true\"] { color: var(--fg); }\n.ro-nav-right .sep { color: var(--mute-2); margin: 0 2px; }\n\n@media (max-width: 760px) {\n  .ro-nav { grid-template-columns: 1fr auto; padding: 14px var(--pad-x); }\n  .ro-nav-mid { display: none; }\n  .ro-nav-brand .name { display: none; }\n}\n\n/* ============================================================\n   HOMEPAGE HERO — full-bleed video, no chrome over it\n   ============================================================ */\n.ro-hero {\n  position: relative;\n  width: 100vw;\n  height: 100svh;\n  height: 100dvh;\n  margin-left: calc(50% - 50vw); /* break out of any parent constraints */\n  overflow: hidden;\n  background: #000;\n}\n.ro-hero-media {\n  position: absolute;\n  top: 50%;\n  left: 50%;\n  width: 100%;\n  height: 100%;\n  transform: translate(-50%, -50%);\n  object-fit: contain;\n  object-position: center center;\n  border: 0;\n  pointer-events: none;\n  filter: grayscale(0.18) contrast(1.06) brightness(0.92);\n}\n.ro-hero-wordmark {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  align-items: flex-start;\n  justify-content: flex-start;\n  padding: clamp(28px, 5vh, 56px) var(--pad-x);\n  z-index: 2;\n  pointer-events: none;\n}\n.ro-hero-wordmark img {\n  display: block;\n  width: clamp(180px, 22vw, 320px);\n  height: auto;\n  filter: drop-shadow(0 2px 30px rgba(0,0,0,0.35));\n  animation: roEmerge 2.2s cubic-bezier(.2,.7,.2,1) both;\n}\n.ro-hero::after {\n  content: '';\n  position: absolute; inset: 0;\n  background: linear-gradient(180deg, rgba(10,10,10,0.35) 0%, rgba(10,10,10,0) 25%, rgba(10,10,10,0) 70%, rgba(10,10,10,0.55) 100%);\n  pointer-events: none;\n}\n.ro-hero-tag {\n  position: absolute;\n  bottom: clamp(28px, 5vh, 60px);\n  left: 50%;\n  transform: translateX(-50%);\n  z-index: 3;\n  font-size: var(--t-10);\n  letter-spacing: 0.42em;\n  color: var(--fg-2);\n  opacity: 0.85;\n  white-space: nowrap;\n}\n@keyframes roEmerge {\n  0%   { opacity: 0; transform: translateY(8px); }\n  100% { opacity: 1; transform: translateY(0); }\n}\n\n/* ============================================================\n   WORKS GRID — homepage 2×2, B&W → color on hover\n   ============================================================ */\n.ro-grid-head {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: baseline;\n  padding: 32px var(--pad-x) 24px;\n  font-size: var(--t-10);\n  letter-spacing: 0.28em;\n  color: var(--mute);\n}\n.ro-grid-head .count { font-variant-numeric: tabular-nums; }\n\n.ro-works {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 0;\n  background: var(--ink);\n}\n.ro-tile {\n  position: relative;\n  height: 78svh;\n  min-height: 520px;\n  overflow: hidden;\n  display: block;\n  background: #000;\n}\n.ro-tile-img {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  filter: grayscale(1) contrast(1.05) brightness(0.78);\n  transition: filter 1.4s cubic-bezier(.2,.7,.2,1),\n              transform 6s cubic-bezier(.2,.7,.2,1);\n  transform: scale(1.0);\n}\n.ro-tile:hover .ro-tile-img,\n.ro-tile:focus-visible .ro-tile-img {\n  filter: grayscale(0) contrast(1.02) brightness(1);\n  transform: scale(1.04);\n}\n.ro-tile::after {\n  content: '';\n  position: absolute; inset: 0;\n  background: linear-gradient(180deg, rgba(10,10,10,0) 40%, rgba(10,10,10,0.7) 100%);\n  pointer-events: none;\n  opacity: 1;\n  transition: opacity .6s ease;\n}\n.ro-tile-num {\n  position: absolute;\n  top: 20px; left: 20px;\n  z-index: 3;\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--fg-2);\n  opacity: 0.7;\n}\n.ro-tile-kind {\n  position: absolute;\n  top: 20px; right: 20px;\n  z-index: 3;\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--fg-2);\n  opacity: 0.7;\n  text-align: right;\n}\n.ro-tile-foot {\n  position: absolute;\n  bottom: 0; left: 0; right: 0;\n  padding: 0 28px 28px;\n  z-index: 3;\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  gap: 24px;\n}\n.ro-tile-title {\n  font-size: clamp(22px, 2.4vw, 32px);\n  letter-spacing: 0.06em;\n  font-weight: 500;\n  margin: 0;\n  color: var(--fg);\n  text-shadow: 0 2px 20px rgba(0,0,0,0.45);\n}\n.ro-tile-year {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--fg-2);\n  opacity: 0.85;\n  white-space: nowrap;\n  padding-bottom: 4px;\n}\n@media (max-width: 760px) {\n  .ro-works { grid-template-columns: 1fr; }\n  .ro-tile { height: 70svh; min-height: 460px; }\n  .ro-tile-img { filter: grayscale(0.4) contrast(1.02) brightness(0.85); }\n}\n\n/* Empty tile (no image) — centered title */\n.ro-tile--empty {\n  background: var(--ink);\n  border-top: 1px solid var(--rule);\n  border-left: 1px solid var(--rule);\n}\n.ro-tile--empty::after { display: none; }\n.ro-tile-center {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 16px;\n  text-align: center;\n  padding: 24px;\n  z-index: 3;\n}\n.ro-tile-center .ro-tile-title {\n  text-shadow: none;\n  letter-spacing: 0.06em;\n}\n.ro-tile--empty .ro-tile-num,\n.ro-tile--empty .ro-tile-kind { opacity: 0.6; }\n.ro-tile--empty:hover .ro-tile-title { color: var(--fg); letter-spacing: 0.1em; }\n.ro-tile--empty .ro-tile-title { transition: letter-spacing .5s ease; }\n\n/* ============================================================\n   PAGE HEAD — small, top-left strip on inner pages\n   ============================================================ */\n.ro-page-head {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 24px;\n  padding: 32px var(--pad-x);\n  border-bottom: 1px solid var(--rule);\n  font-size: var(--t-10);\n  letter-spacing: 0.28em;\n  color: var(--mute);\n}\n.ro-page-head .center { text-align: center; color: var(--fg); }\n.ro-page-head .right  { text-align: right; }\n\n/* For project pages — bigger title sitting under page head */\n.ro-proj-title-wrap {\n  padding: clamp(40px, 8vh, 96px) var(--pad-x);\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: end;\n  gap: 24px;\n  border-bottom: 1px solid var(--rule);\n}\n.ro-proj-title {\n  font-size: clamp(40px, 7vw, 96px);\n  letter-spacing: 0.04em;\n  font-weight: 500;\n  line-height: 0.95;\n  margin: 0;\n  color: var(--fg);\n}\n.ro-proj-meta {\n  font-size: var(--t-10);\n  letter-spacing: 0.28em;\n  color: var(--mute);\n  text-align: right;\n  line-height: 1.9;\n}\n\n/* ============================================================\n   FULL-BLEED IMAGE STACK\n   ============================================================ */\n.ro-image {\n  width: 100%;\n  display: block;\n  overflow: hidden;\n  background: #000;\n}\n.ro-image img {\n  width: 100%;\n  height: auto;\n  display: block;\n}\n.ro-image.tall img,\n.ro-image.cover img {\n  aspect-ratio: 4/5;\n  object-fit: cover;\n  height: auto;\n}\n.ro-image.wide img {\n  aspect-ratio: 16/9;\n  object-fit: cover;\n}\n.ro-cap {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  padding: 10px var(--pad-x) 0;\n  font-size: var(--t-10);\n  letter-spacing: 0.28em;\n  color: var(--mute);\n}\n.ro-cap .center { text-align: center; }\n.ro-cap .right  { text-align: right; }\n\n.ro-dyptic {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 1px;\n  background: var(--rule);\n}\n.ro-tryptic {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 1px;\n  background: var(--rule);\n}\n.ro-dyptic img, .ro-tryptic img {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  display: block;\n  aspect-ratio: 4/5;\n}\n@media (max-width: 760px) {\n  .ro-tryptic { grid-template-columns: 1fr; }\n}\n\n/* ============================================================\n   TEXT BLOCKS\n   ============================================================ */\n.ro-text {\n  padding: clamp(60px, 10vh, 120px) var(--pad-x);\n  display: grid;\n  grid-template-columns: 1fr 6fr 5fr;\n  gap: 48px;\n  align-items: start;\n}\n.ro-text .label {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n}\n.ro-text .body {\n  text-transform: none;\n  letter-spacing: 0.01em;\n  font-size: var(--t-15);\n  line-height: 1.65;\n  color: var(--fg-2);\n  max-width: 56ch;\n}\n.ro-text .body p { margin: 0 0 1.4em; }\n.ro-text .body p:first-child { color: var(--fg); }\n.ro-text .body em {\n  font-style: normal;\n  color: var(--fg);\n  background: linear-gradient(transparent 62%, var(--rule-2) 62%, var(--rule-2) 92%, transparent 92%);\n  padding: 0 2px;\n}\n.ro-text .aside {\n  font-size: var(--t-10);\n  letter-spacing: 0.28em;\n  color: var(--mute);\n  line-height: 2;\n}\n@media (max-width: 900px) {\n  .ro-text { grid-template-columns: 1fr; gap: 32px; }\n}\n\n/* Inverted (white bg) section for rhythm */\n.ro-invert {\n  background: var(--fg);\n  color: var(--ink);\n}\n.ro-invert .label { color: #5a5a57; }\n.ro-invert .body  { color: #2a2a28; }\n.ro-invert .body p:first-child { color: var(--ink); }\n.ro-invert .body em { color: var(--ink); background: linear-gradient(transparent 62%, #d4d4d0 62%, #d4d4d0 92%, transparent 92%); }\n.ro-invert .aside { color: #5a5a57; }\n\n/* ============================================================\n   CREDIT TABLE (project pages)\n   ============================================================ */\n.ro-credits {\n  padding: clamp(60px, 10vh, 120px) var(--pad-x);\n  border-top: 1px solid var(--rule);\n}\n.ro-credits-head {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: baseline;\n  padding-bottom: 40px;\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n}\n.ro-credits-head h2 {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  font-weight: 400;\n  margin: 0;\n  color: var(--mute);\n}\n.ro-credits-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  border-top: 1px solid var(--rule);\n}\n.ro-cred {\n  padding: 18px 18px 22px 0;\n  border-bottom: 1px solid var(--rule);\n  border-right: 1px solid var(--rule);\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  padding-left: 18px;\n}\n.ro-cred:nth-child(4n) { border-right: none; }\n.ro-cred .lbl {\n  font-size: var(--t-10);\n  letter-spacing: 0.28em;\n  color: var(--mute);\n}\n.ro-cred .val {\n  font-size: var(--t-12);\n  letter-spacing: 0.1em;\n  color: var(--fg);\n  line-height: 1.55;\n}\n.ro-cred.span2 { grid-column: span 2; }\n.ro-cred.span4 { grid-column: span 4; }\n@media (max-width: 900px) {\n  .ro-credits-grid { grid-template-columns: 1fr 1fr; }\n  .ro-cred:nth-child(4n) { border-right: 1px solid var(--rule); }\n  .ro-cred:nth-child(2n) { border-right: none; }\n  .ro-cred.span2 { grid-column: span 2; }\n}\n@media (max-width: 540px) {\n  .ro-credits-grid { grid-template-columns: 1fr; }\n  .ro-cred { border-right: none !important; }\n  .ro-cred.span2 { grid-column: span 1; }\n}\n\n/* ============================================================\n   NEXT (project navigation)\n   ============================================================ */\n.ro-next {\n  border-top: 1px solid var(--rule);\n  padding: clamp(40px, 7vh, 80px) var(--pad-x);\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  align-items: center;\n  gap: 32px;\n  transition: background .35s ease, color .35s ease;\n}\n.ro-next:hover { background: var(--fg); color: var(--ink); }\n.ro-next:hover .ro-next-label,\n.ro-next:hover .ro-next-meta { color: #5a5a57; }\n.ro-next-label {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n}\n.ro-next-title {\n  font-size: clamp(28px, 4.5vw, 56px);\n  letter-spacing: 0.04em;\n  font-weight: 500;\n  line-height: 1;\n}\n.ro-next-meta {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n  text-align: right;\n}\n@media (max-width: 760px) {\n  .ro-next { grid-template-columns: 1fr auto; }\n  .ro-next-label { display: none; }\n}\n\n/* ============================================================\n   BIO / CV / CONTACT — common page container\n   ============================================================ */\n.ro-page {\n  padding: 0 var(--pad-x);\n  max-width: 1440px;\n  margin: 0 auto;\n}\n\n/* BIO LAYOUT */\n.ro-bio {\n  padding: clamp(60px, 10vh, 120px) 0;\n  display: grid;\n  grid-template-columns: 5fr 7fr;\n  gap: 64px;\n  align-items: start;\n}\n.ro-bio-portrait {\n  position: sticky;\n  top: 100px;\n}\n.ro-bio-portrait img {\n  width: 100%;\n  height: auto;\n  display: block;\n}\n.ro-bio-prose {\n  text-transform: none;\n  letter-spacing: 0.01em;\n  font-size: var(--t-15);\n  line-height: 1.7;\n  color: var(--fg-2);\n  max-width: 60ch;\n}\n.ro-bio-prose .lead {\n  font-size: 18px;\n  color: var(--fg);\n  margin-bottom: 1.6em;\n}\n.ro-bio-prose p { margin: 0 0 1.4em; }\n.ro-bio-prose em {\n  font-style: normal;\n  color: var(--fg);\n}\n@media (max-width: 900px) {\n  .ro-bio { grid-template-columns: 1fr; gap: 40px; }\n  .ro-bio-portrait { position: static; }\n}\n\n/* BIO TRAJECTORY TABLES */\n.ro-tables {\n  padding: clamp(40px, 7vh, 80px) 0 clamp(60px, 10vh, 120px);\n  border-top: 1px solid var(--rule);\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 64px;\n}\n.ro-tables h3 {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n  font-weight: 400;\n  margin: 0 0 24px;\n}\n.ro-table-row {\n  display: grid;\n  grid-template-columns: 120px 1fr;\n  gap: 16px;\n  padding: 12px 0;\n  border-top: 1px solid var(--rule);\n  font-size: var(--t-11);\n  letter-spacing: 0.16em;\n}\n.ro-table-row:last-child { border-bottom: 1px solid var(--rule); }\n.ro-table-row .k { color: var(--mute); }\n.ro-table-row .v { color: var(--fg); }\n@media (max-width: 760px) {\n  .ro-tables { grid-template-columns: 1fr; }\n  .ro-table-row { grid-template-columns: 80px 1fr; gap: 12px; }\n}\n\n/* CV =============================================== */\n.ro-cv-section {\n  padding: clamp(48px, 8vh, 80px) 0;\n  border-top: 1px solid var(--rule);\n}\n.ro-cv-section:first-of-type { border-top: none; padding-top: clamp(60px, 10vh, 100px); }\n.ro-cv-head {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: baseline;\n  margin-bottom: 32px;\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n}\n.ro-cv-head h2 {\n  font-size: var(--t-11);\n  letter-spacing: 0.32em;\n  color: var(--fg);\n  font-weight: 500;\n  margin: 0;\n}\n.ro-cv-row {\n  display: grid;\n  grid-template-columns: 130px 1fr 1fr 200px;\n  gap: 32px;\n  padding: 16px 0;\n  border-top: 1px solid var(--rule);\n  font-size: var(--t-11);\n  letter-spacing: 0.14em;\n  align-items: baseline;\n}\n.ro-cv-row:last-child { border-bottom: 1px solid var(--rule); }\n.ro-cv-row .date { color: var(--mute); }\n.ro-cv-row .title { color: var(--fg); font-weight: 500; }\n.ro-cv-row .detail { color: var(--fg-2); }\n.ro-cv-row .place { color: var(--mute); text-align: right; }\n@media (max-width: 900px) {\n  .ro-cv-row { grid-template-columns: 1fr; gap: 4px; padding: 14px 0; }\n  .ro-cv-row .place { text-align: left; }\n}\n\n/* CONTACT =========================================== */\n.ro-contact {\n  padding: clamp(80px, 14vh, 160px) 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  align-items: start;\n  min-height: 70svh;\n}\n.ro-contact-label {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n  margin-bottom: 18px;\n}\n.ro-contact-mail {\n  font-size: clamp(20px, 2.6vw, 36px);\n  letter-spacing: 0.04em;\n  color: var(--fg);\n  text-transform: none;\n  font-weight: 500;\n  display: inline-block;\n  border-bottom: 1px solid var(--rule-2);\n  padding-bottom: 6px;\n  transition: border-color .2s;\n}\n.ro-contact-mail:hover { border-color: var(--fg); }\n.ro-contact-info {\n  margin-top: 64px;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 32px;\n  border-top: 1px solid var(--rule);\n}\n.ro-contact-cell {\n  padding: 20px 16px 22px 0;\n  border-bottom: 1px solid var(--rule);\n}\n.ro-contact-cell .lbl {\n  font-size: var(--t-10);\n  letter-spacing: 0.32em;\n  color: var(--mute);\n  margin-bottom: 10px;\n}\n.ro-contact-cell .val {\n  font-size: var(--t-12);\n  letter-spacing: 0.1em;\n  color: var(--fg);\n  line-height: 1.55;\n}\n.ro-contact-cell .val a { transition: color .2s; }\n.ro-contact-cell .val a:hover { color: var(--mute); }\n.ro-contact-message {\n  text-transform: none;\n  letter-spacing: 0.01em;\n  font-size: var(--t-15);\n  line-height: 1.7;\n  color: var(--fg-2);\n  max-width: 44ch;\n}\n.ro-contact-image {\n  width: 100%;\n  height: auto;\n  display: block;\n  margin-top: 40px;\n  filter: grayscale(0.1) contrast(1.04);\n}\n@media (max-width: 900px) {\n  .ro-contact { grid-template-columns: 1fr; gap: 40px; }\n}\n\n/* ============================================================\n   FOOTER — plain text on one line (wraps if needed)\n   ============================================================ */\n.ro-foot {\n  border-top: 1px solid var(--rule);\n  padding: 32px var(--pad-x);\n  display: flex;\n  flex-wrap: wrap;\n  justify-content: space-between;\n  align-items: center;\n  gap: 16px 28px;\n  font-size: var(--t-10);\n  letter-spacing: 0.28em;\n  color: var(--mute);\n}\n.ro-foot a { transition: color .15s; }\n.ro-foot a:hover { color: var(--fg); }\n\n/* ============================================================\n   WATCH — \"Captation\" button + YouTube modal\n   ============================================================ */\n.ro-watch-row {\n  display: flex;\n  justify-content: flex-end;\n  padding: 0 var(--pad-x) 24px;\n  border-bottom: 1px solid var(--rule);\n  margin-bottom: 0;\n}\n.ro-watch {\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n  padding: 12px 0;\n  font-family: var(--sans);\n  font-size: var(--t-11);\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--fg);\n  cursor: pointer;\n  background: none;\n  border: 0;\n  border-bottom: 1px solid var(--rule-2);\n  transition: color .2s, border-color .2s, gap .2s;\n}\n.ro-watch:hover { color: var(--fg); border-color: var(--fg); gap: 18px; }\n.ro-watch .arrow { font-size: 14px; transition: transform .2s; }\n.ro-watch:hover .arrow { transform: translateX(4px); }\n\n/* Modal backdrop */\n.ro-modal {\n  position: fixed;\n  inset: 0;\n  z-index: 200;\n  background: rgba(10,10,10,0.92);\n  backdrop-filter: blur(12px);\n  -webkit-backdrop-filter: blur(12px);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: clamp(20px, 5vh, 60px) clamp(20px, 5vw, 80px);\n  opacity: 0;\n  visibility: hidden;\n  transition: opacity .35s ease, visibility 0s .35s;\n}\n.ro-modal.is-open {\n  opacity: 1;\n  visibility: visible;\n  transition: opacity .35s ease, visibility 0s 0s;\n}\n.ro-modal-frame {\n  position: relative;\n  width: 100%;\n  max-width: 1400px;\n  aspect-ratio: 16/9;\n  background: #000;\n  box-shadow: 0 30px 80px rgba(0,0,0,0.5);\n}\n.ro-modal-frame iframe {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  border: 0;\n}\n.ro-modal-close {\n  position: absolute;\n  top: clamp(16px, 3vh, 36px);\n  right: clamp(16px, 3vw, 36px);\n  font-size: var(--t-11);\n  letter-spacing: 0.32em;\n  color: var(--fg);\n  cursor: pointer;\n  background: none;\n  border: 0;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  z-index: 2;\n  padding: 8px 12px;\n  transition: opacity .2s;\n}\n.ro-modal-close:hover { opacity: 0.7; }\n.ro-modal-close::after {\n  content: '×';\n  font-size: 22px;\n  line-height: 1;\n  letter-spacing: 0;\n}\nbody.ro-modal-open { overflow: hidden; }\n.ro-rule { border-top: 1px solid var(--rule); }\n.ro-sep  { color: var(--mute-2); padding: 0 4px; }\n<\u002Fstyle>\n  <link rel=\"icon\" type=\"image/png\" href=\"f13e26da-b77d-4e96-b240-0fc0fb01758b\">\n\n  \n<\u002Fhead>\n<body>\n\n  <!-- NAV -->\n  <header class=\"ro-nav\">\n    <a href=\"index.html\" class=\"ro-nav-brand\" aria-label=\"Polymorphe\">\n      <img src=\"9907fbae-851f-48e6-a461-5d68acb0a2bd\" alt=\"\">\n      <span class=\"name\">POLYMORPHE<\u002Fspan>\n    <\u002Fa>\n    <nav class=\"ro-nav-mid\" aria-label=\"primary\">\n      <a href=\"index.html#works\"><span lang=\"fr\">Œuvres<\u002Fspan><span lang=\"en\">Works<\u002Fspan><\u002Fa>\n      <a href=\"bio.html\"><span lang=\"fr\">Bio<\u002Fspan><span lang=\"en\">Bio<\u002Fspan><\u002Fa>\n      <a href=\"cv.html\">CV<\u002Fa>\n      <a href=\"contact.html\" class=\"is-active\">Contact<\u002Fa>\n    <\u002Fnav>\n    <div class=\"ro-nav-right\">\n      <button data-lang-btn=\"fr\">FR<\u002Fbutton>\n      <span class=\"sep\">/<\u002Fspan>\n
